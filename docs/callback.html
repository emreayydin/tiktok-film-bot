<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TikTok Login – Code</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px;
           margin: 60px auto; padding: 0 20px; line-height: 1.6; color: #1a1a1a; }
    .code { font-family: monospace; font-size: 1.05rem; word-break: break-all;
            background: #f2f2f2; padding: 16px; border-radius: 8px; margin: 16px 0; }
    button { font-size: 1rem; padding: 10px 18px; border: 0; border-radius: 8px;
             background: #fe2c55; color: #fff; cursor: pointer; }
    .muted { color: #666; font-size: .9rem; }
    .err { color: #c00; }
  </style>
</head>
<body>
  <h1>TikTok Login</h1>
  <p>Kopiere diesen Code und füge ihn im Terminal ein, in dem
  <code>python upload_tiktok.py</code> läuft:</p>
  <div class="code" id="code">…</div>
  <button onclick="copyCode()">Code kopieren</button>
  <p class="muted">Danach kannst du dieses Fenster schließen.</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error");
    const el = document.getElementById("code");
    if (code) {
      el.textContent = code;
    } else {
      el.className = "code err";
      el.textContent = error
        ? ("Fehler: " + error + " – " + (params.get("error_description") || ""))
        : "Kein Code gefunden. Bitte den Login erneut starten.";
    }
    function copyCode() {
      if (code) navigator.clipboard.writeText(code);
    }
  </script>
</body>
</html>
